<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutorials - PyQuest</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--navy:#0D1B2A;--navy-2:#162336;--navy-3:#1E2D42;--navy-4:#243650;--blue:#4A90E2;--blue-light:#6BAEFF;--accent:#00C8FF;--green:#00E5A0;--yellow:#FFB800;--red:#FF6B6B;--white:#FFFFFF;--muted:#8EA8C3;--border:rgba(74,144,226,0.2);--card:rgba(22,35,54,0.9);--sidebar-w:260px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:var(--navy);color:var(--white);display:flex;min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--navy);}::-webkit-scrollbar-thumb{background:var(--blue);border-radius:3px;}
.sidebar{width:var(--sidebar-w);min-height:100vh;background:rgba(13,20,32,0.98);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;transition:transform 0.3s;}
.sb-logo{padding:24px 22px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);text-decoration:none;}
.sb-logo-ico{width:36px;height:36px;background:linear-gradient(135deg,var(--blue),var(--accent));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;color:white;flex-shrink:0;}
.sb-logo-txt{font-size:1.3rem;font-weight:800;color:var(--white);}
.sb-logo-txt span{background:linear-gradient(135deg,var(--blue),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sb-nav{flex:1;padding:16px 12px;overflow-y:auto;}
.sb-section-lbl{font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;padding:8px 12px 6px;margin-top:6px;}
.sb-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;text-decoration:none;color:var(--muted);font-size:0.88rem;font-weight:500;transition:all 0.2s;margin-bottom:2px;position:relative;}
.sb-item:hover{background:rgba(74,144,226,0.1);color:var(--white);}
.sb-item.active{background:linear-gradient(135deg,rgba(74,144,226,0.2),rgba(0,200,255,0.08));color:var(--white);border:1px solid rgba(74,144,226,0.3);}
.sb-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:linear-gradient(180deg,var(--blue),var(--accent));border-radius:0 3px 3px 0;}
.sb-item i{width:20px;text-align:center;font-size:0.95rem;}
.sb-badge{margin-left:auto;background:var(--red);color:white;font-size:0.65rem;font-weight:700;padding:2px 7px;border-radius:50px;}
.sb-bottom{padding:14px 12px;border-top:1px solid var(--border);}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;cursor:pointer;}
.sb-avatar{width:36px;height:36px;background:linear-gradient(135deg,var(--blue),var(--accent));border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;flex-shrink:0;}
.sb-user-info{flex:1;}.sb-user-name{font-size:0.85rem;font-weight:700;}.sb-user-role{font-size:0.72rem;color:var(--muted);}
.sb-logout{color:var(--muted);font-size:0.8rem;cursor:pointer;transition:color 0.2s;}.sb-logout:hover{color:var(--red);}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;}
.topbar{padding:16px 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(13,27,42,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.menu-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:6px;display:none;}
.breadcrumb{font-size:0.85rem;color:var(--muted);}.breadcrumb span{color:var(--white);font-weight:600;}
.search-bar{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:8px 14px;}
.search-bar input{background:none;border:none;color:var(--white);font-size:0.88rem;outline:none;width:200px;font-family:'Sora',sans-serif;}
.search-bar input::placeholder{color:var(--muted);}.search-bar i{color:var(--muted);}
.page-content{padding:28px 32px;flex:1;}
.tut-layout{display:grid;grid-template-columns:240px 1fr;gap:20px;}
.cat-panel{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;height:fit-content;position:sticky;top:88px;}
.cat-panel h3{font-size:0.85rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}
.cat-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;cursor:pointer;transition:all 0.2s;margin-bottom:4px;font-size:0.88rem;font-weight:500;color:var(--muted);border:1px solid transparent;}
.cat-item:hover{background:rgba(74,144,226,0.1);color:var(--white);}
.cat-item.active{background:linear-gradient(135deg,rgba(74,144,226,0.2),rgba(0,200,255,0.07));color:var(--white);border-color:rgba(74,144,226,0.3);}
.cat-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0;}
.cat-count{margin-left:auto;font-size:0.73rem;background:rgba(255,255,255,0.08);padding:2px 8px;border-radius:50px;}
.tut-main{min-width:0;}
.tut-hero{background:linear-gradient(135deg,rgba(74,144,226,0.15),rgba(0,200,255,0.05));border:1px solid var(--border);border-radius:18px;padding:28px;margin-bottom:22px;position:relative;overflow:hidden;}
.tut-hero-lang{font-size:0.75rem;font-weight:700;padding:4px 12px;border-radius:50px;margin-bottom:12px;display:inline-block;}
.tut-hero h2{font-size:1.6rem;font-weight:800;margin-bottom:8px;}
.tut-hero p{color:var(--muted);font-size:0.9rem;line-height:1.65;}
.tut-hero-stats{display:flex;gap:20px;margin-top:16px;flex-wrap:wrap;}
.th-stat{font-size:0.82rem;color:var(--muted);display:flex;align-items:center;gap:6px;}
.th-stat i{color:var(--blue);}
.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
.topic-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:all 0.25s;}
.topic-card:hover{border-color:var(--blue);transform:translateY(-2px);background:rgba(74,144,226,0.07);}
.topic-card.done{border-color:rgba(0,229,160,0.35);}
.tc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.tc-num{font-size:0.72rem;color:var(--muted);background:rgba(255,255,255,0.07);padding:3px 9px;border-radius:50px;}
.tc-check{color:var(--green);font-size:0.85rem;}
.topic-card h4{font-size:0.9rem;font-weight:700;margin-bottom:5px;}
.topic-card p{font-size:0.78rem;color:var(--muted);line-height:1.5;}
.tc-diff{margin-top:8px;font-size:0.72rem;display:flex;align-items:center;gap:5px;}
.topic-detail{display:none;}
.td-back{display:inline-flex;align-items:center;gap:8px;color:var(--muted);cursor:pointer;font-size:0.88rem;margin-bottom:18px;transition:color 0.2s;background:none;border:none;font-family:'Sora',sans-serif;}
.td-back:hover{color:var(--blue-light);}
.td-header{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;margin-bottom:20px;}
.td-tag{font-size:0.72rem;font-weight:700;padding:4px 12px;border-radius:50px;margin-bottom:12px;display:inline-block;}
.td-header h2{font-size:1.5rem;font-weight:800;margin-bottom:9px;}
.td-header p{color:var(--muted);font-size:0.9rem;line-height:1.7;}
.td-meta{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;}
.td-m{font-size:0.8rem;color:var(--muted);display:flex;align-items:center;gap:6px;}
.td-m i{color:var(--blue);}
.td-section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px;}
.td-section h3{font-size:1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:9px;}
.td-section h3 i{color:var(--blue);}
.td-section p{color:var(--muted);font-size:0.9rem;line-height:1.75;margin-bottom:12px;}
.td-section p:last-child{margin-bottom:0;}
.code-block{background:#07111d;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin:14px 0;}
.cb-bar{background:#0f1e2e;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.cb-lang{font-size:0.75rem;color:var(--muted);font-family:'Fira Code',monospace;}
.cb-copy{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.78rem;transition:color 0.2s;font-family:'Sora',sans-serif;}
.cb-copy:hover{color:var(--blue-light);}
.cb-code{padding:18px 20px;font-family:'Fira Code',monospace;font-size:0.86rem;line-height:1.85;overflow-x:auto;}
.kw{color:#C792EA}.str{color:#C3E88D}.fn{color:#82AAFF}.cm{color:#4a6a7a;font-style:italic}.vr{color:#F78C6C}.out{color:#00C8FF}.num{color:#F78C6C}
.tip-box{background:rgba(0,229,160,0.07);border:1px solid rgba(0,229,160,0.25);border-radius:12px;padding:16px 18px;margin:14px 0;display:flex;gap:12px;}
.tip-ico{font-size:1.1rem;flex-shrink:0;margin-top:2px;}
.tip-box p{font-size:0.87rem;line-height:1.65;color:var(--white-soft);margin:0;}
.mistake-box{background:rgba(255,107,107,0.07);border:1px solid rgba(255,107,107,0.25);border-radius:12px;padding:16px 18px;margin:14px 0;}
.mistake-box h4{color:var(--red);font-size:0.88rem;margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.mistake-box p{font-size:0.85rem;color:var(--muted);line-height:1.6;}
.pq-box{background:linear-gradient(135deg,rgba(74,144,226,0.12),rgba(0,200,255,0.05));border:1px solid var(--border);border-radius:14px;padding:20px;}
.pq-box h4{font-size:0.95rem;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.pq-box p{font-size:0.9rem;color:var(--muted);line-height:1.65;margin-bottom:14px;}
.btn-try{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:linear-gradient(135deg,var(--blue),var(--accent));border:none;border-radius:10px;color:white;font-size:0.88rem;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;text-decoration:none;transition:all 0.3s;}
.btn-try:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(74,144,226,0.4);}
@media(max-width:900px){.tut-layout{grid-template-columns:1fr;}.cat-panel{position:static;display:flex;flex-wrap:wrap;gap:8px;}.cat-panel h3{width:100%;}.cat-item{flex:1;min-width:120px;justify-content:center;}.cat-count{display:none;}}
@media(max-width:768px){.sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}.main{margin-left:0;}.menu-btn{display:block;}.page-content{padding:18px 14px;}.topbar{padding:14px 16px;}}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99;}.overlay.show{display:block;}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <a href="index.html" class="sb-logo"><div class="sb-logo-ico">🐍</div><span class="sb-logo-txt">Py<span>Quest</span></span></a>

    <a href="gameindex.html" class="sb-item"><i class="fas fa-gamepad"></i> Games <span class="sb-badge">3</span></a>
    <a href="studentquiz.html" class="sb-item"><i class="fas fa-brain"></i> Quiz</a>
    <a href="studentprogress.html" class="sb-item"><i class="fas fa-chart-line"></i> Progress</a>

</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <div class="breadcrumb">PyQuest / <span id="bcText">Tutorials</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search topics..." oninput="filterTopics(this.value)"></div>
    </div>
  </div>
  <div class="page-content">
    <div id="listView">
      <div class="tut-layout">
        <div class="cat-panel">
          <h3>Languages</h3>
          <div class="cat-item active" onclick="selectLang('python')" id="cat-python"><div class="cat-ico" style="background:rgba(74,144,226,0.2)">🐍</div>Python<span class="cat-count">19</span></div>
          <div class="cat-item" onclick="selectLang('javascript')" id="cat-javascript"><div class="cat-ico" style="background:rgba(255,184,0,0.2)">⚡</div>JavaScript<span class="cat-count">14</span></div>
          <div class="cat-item" onclick="selectLang('html')" id="cat-html"><div class="cat-ico" style="background:rgba(255,107,107,0.2)">🌐</div>HTML<span class="cat-count">12</span></div>
          <div class="cat-item" onclick="selectLang('css')" id="cat-css"><div class="cat-ico" style="background:rgba(0,229,160,0.2)">🎨</div>CSS<span class="cat-count">13</span></div>
          <div class="cat-item" onclick="selectLang('c')" id="cat-c"><div class="cat-ico" style="background:rgba(138,43,226,0.2)">⚙️</div>C<span class="cat-count">11</span></div>
          <div class="cat-item" onclick="selectLang('cpp')" id="cat-cpp"><div class="cat-ico" style="background:rgba(0,200,255,0.2)">🔧</div>C++<span class="cat-count">12</span></div>
        </div>
        <div class="tut-main" id="tutMain"></div>
      </div>
    </div>
    <div id="detailView" class="topic-detail">
      <button class="td-back" onclick="backToList()"><i class="fas fa-arrow-left"></i> Back to Topics</button>
      <div id="detailContent"></div>
    </div>
  </div>
</div>
<script>
const LANGS = {

raries',diff:'Advanced',done:false},{id:'py-proj',title:'Mini Projects',desc:'Build real Python programs',diff:'Advanced',done:false}]},
  javascript:{name:'JavaScript',ico:'⚡',color:'rgba(255,184,0,0.1)',badge:'#FFB800',desc:'Make websites come alive! JavaScript is the language of the web and runs in every browser.',topics:[{id:'js-intro',title:'Introduction to JS',desc:'What is JavaScript and what can it do?',diff:'Beginner',done:false},{id:'js-vars',title:'Variables',desc:'var, let, const differences',diff:'Beginner',done:false},{id:'js-ops',title:'Operators',desc:'Arithmetic, comparison, logical',diff:'Beginner',done:false},{id:'js-func',title:'Functions',desc:'Regular and arrow functions',diff:'Beginner',done:false},{id:'js-dom',title:'DOM Manipulation',desc:'Change HTML with JavaScript',diff:'Intermediate',done:false},{id:'js-arr',title:'Arrays',desc:'Lists and array methods',diff:'Intermediate',done:false},{id:'js-obj',title:'Objects',desc:'Key-value pairs and methods',diff:'Intermediate',done:false},{id:'js-loops',title:'Loops',desc:'for, while, forEach loops',diff:'Intermediate',done:false},{id:'js-ev',title:'Events',desc:'Click, input, keyboard events',diff:'Intermediate',done:false},{id:'js-scope',title:'Scope & Closures',desc:'Variable visibility explained',diff:'Advanced',done:false},{id:'js-async',title:'Async/Await',desc:'Handle asynchronous operations',diff:'Advanced',done:false},{id:'js-api',title:'Fetch API',desc:'Get data from external sources',diff:'Advanced',done:false},{id:'js-es6',title:'ES6+ Features',desc:'Modern JavaScript syntax',diff:'Advanced',done:false},{id:'js-proj',title:'Mini Projects',desc:'Build interactive web apps',diff:'Advanced',done:false}]},

const TOPIC_DETAIL = {
  'py-vars':{title:'Variables in Python',lang:'Python',langIco:'🐍',diff:'Beginner',time:'10 min',explanation:`A variable is a named container that stores a value in memory. In Python, you don't need to declare the type — Python figures it out automatically!\n\nThink of a variable like a labeled box: you put something in it, give it a name, and use that name to find it later.`,example:`# Creating variables\nname = "Alice"       # String variable\nage = 20             # Integer variable\ngpa = 3.8            # Float variable\nis_student = True    # Boolean variable\n\n# Using variables\nprint(name)      # Output: Alice\nprint(age)       # Output: 20\nprint(gpa)       # Output: 3.8`,tip:'Variable names should be descriptive. Use snake_case (my_name) not camelCase in Python. Variable names cannot start with a number!',mistake:`# ❌ Wrong — variable name starts with number\n1name = "Alice"\n\n# ❌ Wrong — using spaces in name\nmy name = "Alice"\n\n# ✅ Correct\nmy_name = "Alice"\nfirst_name = "Alice"`,practice:'Create 3 variables: your name, your age, and your favorite programming language. Print all three on separate lines.'},
  'py-loops':{title:'Loops in Python',lang:'Python',langIco:'🐍',diff:'Intermediate',time:'15 min',explanation:`Loops allow you to repeat a block of code multiple times without writing it over and over. Python has two main loop types:\n\n• for loop — repeats for each item in a sequence\n• while loop — repeats as long as a condition is true`,example:`# for loop — count from 0 to 4\nfor i in range(5):\n    print(i)\n# Output: 0  1  2  3  4\n\n# for loop — iterate over a list\nfruits = ["apple", "mango", "banana"]\nfor fruit in fruits:\n    print("I love", fruit)\n\n# while loop — count up\ncount = 0\nwhile count < 3:\n    print("Count:", count)\n    count += 1    # Don't forget to increment!`,tip:"Always make sure a while loop has a way to stop! If the condition never becomes False, your program will run forever (infinite loop).",mistake:`# ❌ Infinite loop — missing increment!\ncount = 0\nwhile count < 5:\n    print(count)\n    # forgot: count += 1\n\n# ✅ Correct\ncount = 0\nwhile count < 5:\n    print(count)\n    count += 1`,practice:'Write a loop that prints all even numbers from 2 to 20. Use both a for loop and a while loop version.'}
};
let currentLang = 'python';
function selectLang(lang){
  currentLang = lang;
  document.querySelectorAll('.cat-item').forEach(c=>c.classList.remove('active'));
  document.getElementById('cat-'+lang).classList.add('active');
  renderTopics(lang);
}
function renderTopics(lang){
  const L = LANGS[lang];
  const main = document.getElementById('tutMain');
  const diffTxt={Beginner:'color:#00E5A0',Intermediate:'color:#FFB800',Advanced:'color:#FF6B6B'};
  main.innerHTML = `
    <div class="tut-hero">
      <span class="tut-hero-lang" style="background:${L.color};color:${L.badge}">${L.ico} ${L.name}</span>
      <h2>${L.name} Programming</h2>
      <p>${L.desc}</p>
      <div class="tut-hero-stats">
        <span class="th-stat"><i class="fas fa-book"></i> ${L.topics.length} Topics</span>
        <span class="th-stat"><i class="fas fa-clock"></i> ~${L.topics.length * 12} mins total</span>
        <span class="th-stat"><i class="fas fa-star"></i> Beginner Friendly</span>
      </div>
    </div>
    <div class="topics-grid" id="topicsGrid">
      ${L.topics.map((t,i)=>`
        <div class="topic-card ${t.done?'done':''}" onclick="openTopic('${t.id}','${lang}')">
          <div class="tc-top">
            <span class="tc-num">#${String(i+1).padStart(2,'0')}</span>
            ${t.done?'<span class="tc-check">✅</span>':''}
          </div>
          <h4>${t.title}</h4>
          <p>${t.desc}</p>
          <div class="tc-diff" style="${diffTxt[t.diff]}"><span>●</span> ${t.diff}</div>
        </div>
      `).join('')}
    </div>`;
}
function filterTopics(q){
  document.querySelectorAll('.topic-card').forEach(c=>{
    const h=c.querySelector('h4').textContent.toLowerCase();
    const p=c.querySelector('p').textContent.toLowerCase();
    c.style.display=(h+p).includes(q.toLowerCase())?'':'none';
  });
}
function openTopic(id,lang){
  const L=LANGS[lang];
  const topic=L.topics.find(t=>t.id===id);
  const detail=TOPIC_DETAIL[id];
  document.getElementById('listView').style.display='none';
  document.getElementById('detailView').style.display='block';
  document.getElementById('bcText').textContent=topic.title;
  if(detail){
    document.getElementById('detailContent').innerHTML=`
      <div class="td-header">
        <span class="td-tag" style="background:${L.color};color:${L.badge}">${L.ico} ${L.name}</span>
        <h2>${detail.title}</h2>
        <p>${detail.explanation.split('\n\n')[0]}</p>
        <div class="td-meta">
          <span class="td-m"><i class="fas fa-clock"></i> ${detail.time}</span>
          <span class="td-m"><i class="fas fa-signal"></i> ${detail.diff}</span>
          <span class="td-m"><i class="fas fa-book-open"></i> ${L.name}</span>
        </div>
      </div>
      <div class="td-section">
        <h3><i class="fas fa-lightbulb"></i> Explanation</h3>
        ${detail.explanation.split('\n\n').map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('')}
      </div>
      <div class="td-section">
        <h3><i class="fas fa-code"></i> Code Example</h3>
        <div class="code-block">
          <div class="cb-bar"><span class="cb-lang">${L.name.toLowerCase()}</span><button class="cb-copy" onclick="copyCode(this)">📋 Copy</button></div>
          <div class="cb-code"><pre>${highlightCode(detail.example)}</pre></div>
        </div>
      </div>
      <div class="td-section">
        <h3><i class="fas fa-star"></i> Tips</h3>
        <div class="tip-box"><span class="tip-ico">💡</span><p>${detail.tip}</p></div>
      </div>
      <div class="td-section">
        <h3><i class="fas fa-exclamation-triangle"></i> Common Mistakes</h3>
        <div class="mistake-box">
          <h4><i class="fas fa-times-circle"></i> Watch Out For:</h4>
          <div class="code-block" style="margin-top:8px">
            <div class="cb-bar"><span class="cb-lang">${L.name.toLowerCase()}</span></div>
            <div class="cb-code"><pre>${highlightCode(detail.mistake)}</pre></div>
          </div>
        </div>
      </div>
      <div class="td-section">
        <h3><i class="fas fa-dumbbell"></i> Practice Challenge</h3>
        <div class="pq-box">
          <h4>🎯 Try It Yourself</h4>
          <p>${detail.practice}</p>
          <a href="studentsandbox.html" class="btn-try"><i class="fas fa-terminal"></i> Open Sandbox to Practice</a>
        </div>
      </div>`;
  } else {
    document.getElementById('detailContent').innerHTML=`
      <div class="td-header">
        <span class="td-tag" style="background:${L.color};color:${L.badge}">${L.ico} ${L.name}</span>
        <h2>${topic.title}</h2>
        <p>${topic.desc} — Explore this topic to build your programming skills step by step.</p>
        <div class="td-meta">
          <span class="td-m"><i class="fas fa-clock"></i> ~12 min</span>
          <span class="td-m"><i class="fas fa-signal"></i> ${topic.diff}</span>
        </div>
      </div>
      <div class="td-section">
        <h3><i class="fas fa-lightbulb"></i> Overview</h3>
        <p>This topic covers <strong>${topic.title}</strong> in ${L.name}. Understanding this concept is essential for writing effective programs.</p>
        <p>Work through the examples carefully, try them in the Sandbox, and test yourself with the quiz when you're ready!</p>
        <div class="tip-box"><span class="tip-ico">💡</span><p>The best way to learn is by doing! After reading, open the Sandbox and try writing the code yourself. Mistakes are part of learning.</p></div>
      </div>
      <div class="td-section">
        <h3><i class="fas fa-dumbbell"></i> Practice</h3>
        <div class="pq-box">
          <h4>🎯 Ready to Practice?</h4>
          <p>Open the sandbox and experiment with ${topic.title} concepts. Try writing your own code and see what happens!</p>
          <a href="studentsandbox.html" class="btn-try"><i class="fas fa-terminal"></i> Open Sandbox</a>
        </div>
      </div>`;
  }
}
function backToList(){
  document.getElementById('listView').style.display='block';
  document.getElementById('detailView').style.display='none';
  document.getElementById('bcText').textContent='Tutorials';
}
function highlightCode(code){
  return code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(#[^\n]*)/g,'<span class="cm">$1</span>')
    .replace(/(".*?"|'.*?')/g,'<span class="str">$1</span>')
    .replace(/\b(def|class|if|else|elif|for|while|return|import|from|True|False|None|in|and|or|not|print|input|range|len|int|str|float)\b/g,'<span class="kw">$1</span>')
    .replace(/\b(\d+\.?\d*)\b/g,'<span class="num">$1</span>');
}
function copyCode(btn){
  const code=btn.closest('.code-block').querySelector('pre').textContent;
  navigator.clipboard.writeText(code).then(()=>{btn.textContent='✅ Copied!';setTimeout(()=>btn.textContent='📋 Copy',2000);});
}
function init(){
  const u=JSON.parse(localStorage.getItem('pyquest_current_user')||'{}');
  if(u.firstName){document.getElementById('sbNm').textContent=u.firstName+' '+(u.lastName||'');document.getElementById('sbAv').textContent=u.firstName[0].toUpperCase();}
  selectLang('python');
}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
function logout(){localStorage.removeItem('pyquest_current_user');window.location.href='login.html';}
init();
</script>
